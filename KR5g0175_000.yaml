  text: 上清天關三圖經明一
  hash: sha256:9ff0e0294fb29a566535b06e7f367d74e65b6e69db0120e9c0b5212ea6325ef3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0175_HFL_000-001a, image: hfl/1040/1040-004.png}
body:
  text: 太霄隱訣凡修七星移度之道上招玉皇九君玄精内照斷塞死根當寂心幽房不關風塵獨立對境盻觀霄晨燒香左右散煙霞庭精心苦念存想勿眠如此七年則致瓊輿飛蓋丹轅來迎兆身上登天關塞死路於東北記生録於南仙所謂難希之道易降之眞者也夫有金格玉名得披此道當以壬寅丙寅甲子甲午辛未辛丑此六㑹日髙上值合之時也玉帝常以其日使侍仙玉郎校定青華東宫金格玉名學仙之録是其日有勤志上徹感啓玉皇者即命北帝酆都六宫斷絶死録之根記生録於人門移七星加於鬼門度玄樞披天關毎當清齋苦念注玄冥目内存叩齒三十六通思第一太星玄樞陽明天樞魂神上玄九君衣飛雲錦裙頭戴玄晨之冠從玄斗中下入我身中因祝曰玄樞陽明天樞魂神上眞九君混合變化共爲一神願爲我斷死路於鬼户度生録於南軒除七玄於三塗受胎生而更仙廽七精以玄䕃度我形於天關畢咽氣二七過修行不懈上招玉皇之賔帝降紫霞之雲衛以寳華玉女金晨玉童各十二人侍衛子身次思第二元星北胎隂精天璇魂神上玉九君同著黄錦飛裙頭建玄晨之冠從玄斗中下降入我身咽氣呪曰北胎隂精天璇魂神上玉九君混合萬變共爲一神願爲我削陽罪於太隂度隂氣於太陽移七元以斷死披六合於天關㧞七祖於三塗受胎根於南軒畢便咽氣二七過次思第三眞星九極上眞上元夫人天璣魄精上素九君同著青錦飛裙頭建玄晨之冠從玄斗中下降入我身咽氣呪曰九極上眞上元夫人天璣魄精上素九君混合變化共爲一神願爲我披解宿對之根斷絶死道之源令我目明徹視洞鑒无窮玄眞仰注精灌我身上攀皇魁飛歩七元駕景乘空與天相傾畢便咽氣二七過次思第四樞星璇璣玄冥天權魂精上虚九君同著紫錦飛裙頭建玄晨之冠從玄斗中下降入我身中便呪曰璇璣玄冥天權魂精上虚九君混合萬變共爲一神願爲我移度七星塡塞鬼門斷塞死氣披朗天關廽北斗於玄樞度生氣於西坤離北帝於酆都得記名於南軒畢咽氣二七過次思第五剛星天平丹元玉衡魂靈上玄九皇君同著丹錦帔裙頭戴玄晨之冠從玄斗中下降入我身中便呪曰天平丹元玉衡魂靈上玄九皇君混合萬變共爲一神爲我上降七精下注我身廽四轉三豁落七元塞死户於東北受生宫於九玄記名東華得侍玉晨畢咽氣二七過次思第六紀星命機北極闓陽魂靈上丹皇虚九君同衣朱錦飛裙頭建玄晨之冠從玄斗中下降入我身中呪曰命機北極闓陽魂靈上丹皇虚九君混合萬變共爲一神爲我上開天一三圖玄關下轉北帝酆都六宫制御隂官落除九死之根廽三還四度名七元長保无窮與斗同年畢咽氣二七過次思第七關星玄陽天關揺光太明太上玉皇道君同著丹錦飛羅裙頭建玄晨之冠從玄斗中下降入我身中便呪曰玄陽天關揺光太明太上玉皇道君混合萬變共爲一神願爲我上招帝晨九眞帝君九隂混合逥轉天門解我七玄之祖令得遨遊玄雲削我北隂死根記我東華玉篇畢便咽氣二七過存七元畢叩齒十二通瞑目思北方七星光明煥照北方星精内映來覆我身斗中眞君混沌變化无有常形共乘緑霞之雲來迎我身同昇七星之中自覺我身在斗中央華蓋之下精光煥赫冠帀一身隨斗運轉如車之輪須㬰之頃已開天關七星九君各授我豁落七元開關之符以制北帝六宫斷塞死氣之根受符而旋以復本元還在斗中七符煥照如火之精運我來下豁然蹈空倐忽之間安住寢床叩齒三十六通仰頭呪曰玄光耀精流景電形乘霞遯變上昇七星璇璣促轡如電奔驚天一開關度我著生北帝隂宫落我死名不度不落上向七精我佩七元流金火鈴豁落天機流漫八冥運使六甲䇿御六丁天降玄覆帝給神兵乞匃東華記我玉名飛空乘虚上詣玉清畢便三十六咽氣止以開天關斷死根混合萬變之道畢於此行之七年佩豁落七元符則有飛霞綠軿來迎兆身唯在祕修愼勿輕傳帝君豁落七元符開天關符在下卷内行移度七星事畢行之七年佩豁落七元卷内畫相眞人除已注說外並碧冠緑帔絳服朱履乘五色彩雲存思眞人各碧冠黄服綠帔青禒餘宫殿間金取宜裝飾北帝酆都六宫度死法酆都山在北方癸地故東北爲鬼戸死氣之根山髙二千六百里周廻三萬里其山洞元在山之下周廻一萬五千里其上下並有鬼神宫室山上有六宫洞中又有六宫一宫周廽千里是爲六天鬼神之宫第一名紂絶隂天宫第二名泰殺諒事宗天宫第三名明晨耐犯武城天宫第四名恬照罪氣天宫第五名宗靈七非天宫第六名敢司連宛屢天宫右六宫是北帝所主六天鬼神所治領人之死名死者莫不由酆都六宫也是故帝君常以七星移度學生之人過天關開南極之宫斷塞東北之死户也子行移度都畢當叩左齒九通呼六宫之名而呪曰吾是帝君之臣名書玉清下統六天北帝鬼宫悉是我營我之所部何鬼敢生右佩豁落左帶火鈴擲火萬里威制萬靈有犯者戮有干者刑帝君有命收捕无停如此都畢一呪則天光駭動萬魔束形三呪則鬼祅滅種六宫絶人死名天關度人南極生人學不知酆都宫名鬼神所治不學斷塞死根萬无成仙也行移度七星事畢次思存帝尊二星當平坐東向叩齒三十六通存帝尊二星髙上玉皇八景元君九尊太微玉帝君太素七星元君同著飛雲紫錦裙建玄晨之冠從玄斗中下降入我身呪曰髙上玉皇八景元君九尊太微帝君太素七星元君九變混合上帝二尊爲我上開天關移度玉名斷塞鬼戸北帝六宫死根斷絶上昇七元賜我八景七精九皇飛輿綠軿同登帝晨緫朝皇妃攝御萬靈畢咽氣三七過次存帝尊二符上登七星華蓋之中二尊星治在華蓋之下常覆二星精光不見人无見者故金書玉字玄得見二星延夀六百年子无二帝飛空上符則不得上登華蓋之下二星亦不見於子得佩二符二帝自以玄光映子之身修行九年白日升晨五離解過絶死度生上法行六㑹移度之道當修五晨離於死户度於生宫飛仙之法當以壬申丙申戊申甲申庚申五離之日是時帝君髙宴景龍之輿緑霞飛軿從仙官玉女周旋十天下降人間看察學仙之人命北帝太隂五君齎死録上詣平都主筭官推校死生簿録五方五星眞皇道君各統一方緫領諸仙應得道者言名東華有隂罪隂過陽罪陽過結在北帝太隂君言名酆都之宫離别善惡生死之人是故五離之日首罪於太隂修生於太陽落死籍於北帝求仙於五星毎至其日齋盛衣服燒香入室悔過念善存神内思一心注玄無有他念帝君周行三界神官自記子之功言名於玉皇也如此五年尅得五星眞皇來降子室也毎至五離日平旦日中夜半三時入室燒香北向再拜叩齒三通呪曰髙上玉皇帝君乞匄原除我七祖以來下及某身所行隂惡无道殺生滛慢𡜍害出法千條萬犯陽罪隂過名奏北帝者並乞除散削滅罪名斷落死根度入天關得在東華書字玉篇七祖父母反胎南仙畢思北方辰星眞皇道君精原著紫錦飛裙腰帶虎符首建華冠乘綠霞飛雲從十二仙官從北方來下降覆我身光色鬱藹煥赫精芒仰呪曰北上眞皇總統飛仙乘雲廽軿來冠我身乞爲我塡塞鬼户離絶死根言名玉清披釋天關我得去離北帝上昇南軒夀與眞皇同保北晨便咽氣二十五過止東向再拜叩齒三通存咒曰玉晨太上君太極元景君乞匄原某年一以來所行隂罪陽過上及七祖宿對重愆結在三隂者並乞披釋離滅罪名塡塞死根北帝除我宿結東華記我玉篇七玄父母同昇帝晨次思東方嵗星中眞皇君青牙著雲錦龍紋之裙腰帶虎符首建華冠乘碧霞飛雲玉輿從十二仙官從東方來下降覆我身光色鬱鬱煥爛向東方仰呪曰東方中眞流霞九門光映内外覆冠兆身乞匄賜我告下北帝離我死根度我玉名東華内眞我得升度永離死路七玄父母成亨福祚與月俱生與日同暮乘虚浮空上登飛歩便咽氣九過止南向再拜叩齒三通存呪曰上清三元君南極上元君太陽九氣玉賢元君乞匄原某有知以來所行元惡不孝違逆无道姧滛偷𥨸隂罪陽過上及七祖宿結流逮簡目在於太隂罪名係於北晨乞匄披釋離滅三官宿對之目塡絶死氣之根過度東北之户上昇西南開關七玄父母咸蒙帝恩畢次思南方熒惑星眞皇君淮渟著雲霜鳳華龍鈴裙腰帶虎書首䢖玄晨之冠飛青錦衣乘丹霞絳輿從十二仙官從南方來下降覆我身光色煥赫如日之升仰呪曰南方真皇玄象流光徘徊三門叅駕丹輿上升七元光明内暎洞冠我身爲我降絶北帝罪名解結散滯消㓕太隂身離鬼戸之中斷絶宿對之根上披天關升入南軒七祖父母同謁帝前便咽氣八過止西向再拜叩齒三通存呪曰太素三元君四老道中君乞匄原赦某有識以來所行所犯𡜍妬賢能輕泄經文履穢染塵洿慢三光呪誓悲淚上觸帝君宿對結在太隂罪名係於鬼官者乞匄披釋離滅考根斷塞死路度名生門七祖父母上升福堂畢次𢙣西方太白星真皇君著皓錦流鈴裙腰帶虎章首建扶晨之冠乘素霞飛軿從十二仙官從西方來下降覆我身光明洞徹煥赫西方便仰呪曰西方真皇素暎玄摽參駕玉輿素華鬱霄逥晨來降真形披交爲我逥轉九戸度身皇朝身離太隂之録上升玄宫同謡夀傾天地億年不彫七玄父母咸登晨霄畢便咽氣六過止次中央再拜叩齒三通存呪曰髙上太帝君玉皇君乞匄原赦某受生以來迄于今日所行所犯億愆兆過七祖宿對連染不解事結太隂者並乞解除披釋散絶北帝玄名斷絶癸地鬼戸死氣之根度名天關歴過五晨七玄父母咸蒙更仙畢次思中央鎮星真皇君躭騁延著黄雲龍錦虎裙腰佩金符首䢖紫冠駕黄霞飛輿從十二仙官從中央來下冠覆我身光明洞徹焕落中元便仰呪曰中央鎮星真皇君總攝五帝運轉玄綱叅駕黄霞周行四方爲我落絶死根度名南陽之宫離五還六與我同翔變化萬津永享无量上登太極金闕玉堂七祖父母同荷利昌畢便咽氣十二過止五離首過於五帝存五晨以度生事畢於此也若常至其日行之不廢七年感徹五晨真皇見形於子寢房也太帝自遣五方玉女五人衞子之身北帝太隂亦來朝子之門不敢拘子之罪也學仙求真冝勤行焉悔過求仙之道是上相青童君請金闕聖君之法爲後學求生之者作戒爾非太常君之悔過也行其事帝君亦鑒子之心自宿過不盡六天之宫亦不落子死名開關之府亦不度子之身是故離合之府開關之門開關之門爲度生之宫離合之府爲塡死之源也惟在精求便得其真也帝君明燈内觀求仙上法南極上元君受帝君常居朗玄之臺金房紫戸之内明玄燈以自暎通霞光於八䆫念太真於五形披三願於帝房靈上降於紫蓋元皇給以金童自然號我帝位總掌於玄宫太品生乎始妙道在㣲芒今以相告子勤奉焉告南極上元君曰子學神真之道䖏靈宫之上瓊房之内而不知明燈以自暎通玄光於五藏之内因得明矣形體之神因得歸也子能暮明燈於本命朝明燈於行年常明燈於太嵗三䖏願念即體澄氣正真光内照萬神朗清元君奉受法度施行三年即致夜光童子二十四人玄光自然而明不須明燈而通光也然此上真之妙法亦不傳於下世若有金名玉字玄格者得吾此道行之九年身體光明徹視萬里朗覩自然夜光童子降子之房授子真書白日登晨常明燈於所住静室本命之上暮入室向燈長跪叩齒十二通呪曰玄光暎太隂八逹朗且明澄神曲室裏仰徹耀上清五輝發朗臺玉芝自然生洞照通太真萬神監我形削滅九隂氣記上東華名保我无終休長與日月并㧞度七玄難南宫更受榮明光戯玉皇上受内觀經天降飛霄輦騰空御緑軿得謁太帝館進拜玉皇庭畢再拜向本命仰頭咽液七過止又常明燈於行年之上朝而向燈叩齒十二通呪曰明燈照行年散光煥八方嬰嬰色象澄内觀朗空同披釋朗神䘳子與玉真通仰宗髙上道眇邈无行蹤思得玄雲降控轡御飛龍却我百年期還反嬰兒容賜我西華女給我金晨童侍香履年命稽首玉帝房神㤗道亦暢懽適香烟中整心注太玄精感洞虚无室招神霄降瞑目矚仙公㧞過七祖難度形還南宫畢再拜向燈咽氣二七過止常太嵗上明燈以通神理願以求眞三年玄光内暎神真下降授子不死之方當時自有感應也當朝夕燒香叩齒十二過向燈呪曰燈火暎太真明光徹玄虚披朗无上道心注玉帝廬洞逹空洞内神覩形自舒積感致靈降心怗理潜灰朝禮太帝堂夕誦金真書逍遥玄都裏萬嵗反嬰孩天冠紫霄霞帝給緑瓊輿浮遊五嶽巔適意得所如七祖免三塗福慶有盈餘畢再拜咽液二七過止若能𢘆於三䖏明燈不㓕七玄九祖即得去離十苦上升南仙一身神明澄正目視萬里耳聦逺聽心智逆知未然神真來降夜光童子當教子求仙之道九年如此靈光自明通於表裏也五離首過於五帝存五晨以度生事畢於此也帝君五願求仙上法帝君常以九月九日十月五日三月三日四月八日七月七日此五願十㑹之時也上登太極瓊臺髙上玉殿金室之内存五願於瓊宫希玄真以自降虚无啓以玉帝金音暢於太空召五帝以衛靈萬慶㑹於丹房故有感而致真真亦感發而降焉是其日常沐浴清齋入室燒香心拜四方正東向平坐東向者是當陽始暉之方也叩齒三十六通第一上願我生自然之氣氣中結成我身身與三光齊倫長享无極之根二願我身常䖏太空之上瓊宫玉房之裏朝與玉帝同宴夕與玄母同止渇噏浪井洪泉玉芝飢納龍胎瓊腴絳樹赤子三願我身生萬瑞七十二光竒毛異骨飛羽衣裳乘雲駕空出入帝宫衆慶來臻萬善旡量四願與旡俱生與旡俱死死而又生生爲真皇封掌十天總領群仙五願一切衆生已生未生同保日月三光有道之人七玄之祖上升南宫天下之福靡有不當四方五願並㑹玉堂次上願九玄扶養我身魂魄真神𢘆居我宫上通天仙下逮洞淵願天願地願風願神願仙五願一合定籍長生天降紫烟地衛五靈乘雲駕虚飛輦緑軿上造金闕進登玉清慶及七祖更受胎生五願五合長享利貞中願亦五得道本根願隂願陽願太空願太无願太玄上宴玉房與帝因縁遊䀎生闕披朗九天元父定籍玄母記年桃康結精保固丹田身騰金闕名書玉篇七祖解脫福慶來臻下願亦五願太虚願太有願太上願太真願神仙運身於五嶽之巔飄颻九霄之際出入開關之裏移脫死戸之外願天地爲我父母三光衛我萬年神守九原之孔靈降自然之氣八方五願與響而㑹五願畢叩齒二七通呪曰大帝上元帝一玄經五雲散景鬱鬱三清玉童玉女燒香侍靈上願開陳與我合形使我神仙上升帝庭北帝落死南關注生東華金格得上我名无窮之願與我齊并祝畢又叩齒三七遍仰咽氣五過止此帝君開陳上願與靈合形之道也常能爾者則玉華侍衛玉童散香上徹九天感應帝皇五年如此道自降矣天下十方有道之願道无不降子之情口願之際當令心意在一不得他念外想真神散越則真不降也履淹冐穢真亦逺也帝君上願五㑹之道畢於此也每至其日若能精心願念如法帝遣玉童衛子之身招致五方之願神仙之道來降爾形如此五年尅乘雲上昇九天列名東華七祖父母亦荷福慶得去三塗受仙南宫也南極上元君曰世人之學唯知朝求而暮獲一念而希降吐呪而望應而不知登棲岐之巔起於山跡千丈之木出於毫末道髙而真妙豈可發足而登於雲梯耶帝君受氣而掌真猶尚明燈以自通五願以希慶豈不能包於自然也夫求仙之道皆當先願而後求願感而致靈爾五願之大也願亦无所不包福亦无所不覆慶亦无所不流可謂蠲願善矣若能精心在願亦无不響應後來有情者爲復訪而意焉上相青童君曰吾徃學經歴七百年渉峻登巔越東跨西殊南經北逍遥中原經師三十二人凡受三百餘事未得上登金闕詣聖君受靈書紫文服日月黄華拘魂制魄之道結璘鬱儀九真八道解形遯變紫度炎光流金火鈴吐納飛霞騰空歩雲躡行七元寳經聖君以七星移度太帝所寳告盟見授使斷落六宫死名塡塞東北鬼戸上聞天關移度我身然後可得上登三元奉行遂得上相之司總領群仙七星煥落於天逥轉九元之精上乗三元之氣下統六天之名生死離合莫不由於七星故人爲斗所加則死斗所移則生故七星爲天之相開關爲度生之府夫學不知斷死户於北斗度生目於南關生不可保乎上帝以此經移於六合之房命西華玉女金晨金童三百人侍衛靈文後傳聚真乃出於名山西城王君後於王屋石室之內見有此文王君方退齋三月齎信詣山奉受披省是七星移度修行其道得成真人自无玉名成仙之人莫能聞見此道有經之子酆都之六宫便記子之名移度南關况復修行之耶王君云此本有三卷天關天圖二卷不行於世南嶽夫人所受正得一卷七星移度爾上清天關三圖經
